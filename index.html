<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Helvetica, Arial, sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  display: flex;
}

/* SIDEBAR (Spotify-style) */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #000;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  margin-bottom: 30px;
  font-size: 1.4rem;
}

.sidebar a {
  display: block;
  color: #aaa;
  margin: 12px 0;
  text-decoration: none;
  transition: 0.2s;
}

.sidebar a:hover {
  color: white;
}

/* MAIN */
.main {
  margin-left: 240px;
  padding: 30px;
  width: 100%;
}

/* HEADER */
.header {
  margin-bottom: 30px;
}

.header h1 {
  font-size: 2.5rem;
}

.header p {
  color: #888;
  margin-top: 5px;
}

/* SECTION TITLE */
.section-title {
  margin: 30px 0 15px;
  color: #ccc;
  font-size: 1.2rem;
}

/* GRID (Apple Music style) */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 18px;
}

/* CARD */
.card {
  background: #111;
  border-radius: 16px;
  overflow: hidden;
  transition: 0.25s ease;
  position: relative;
}

.card:hover {
  transform: scale(1.04);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

iframe {
  width: 100%;
  height: 420px;
  border: none;
}

/* TAGS */
.tag {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.1);
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* MOBILE */
@media(max-width: 768px){
  .sidebar {
    display: none;
  }
  .main {
    margin-left: 0;
  }
}
</style>
</head>
