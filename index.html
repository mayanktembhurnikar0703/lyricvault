<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lyricvault.wav</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  letter-spacing: 2px;
  animation: fadeIn 1.2s ease forwards;
}

.hero p {
  margin-top: 10px;
  color: #aaa;
  animation: fadeIn 2s ease forwards;
}

.btn {
  margin-top: 20px;
  padding: 12px 24px;
  border: 1px solid #fff;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: white;
  color: black;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: #111;
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

iframe {
  width: 100%;
  height: 500px;
  border: none;
}

/* SCROLL ANIMATION */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  color: #777;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>lyricvault.wav</h1>
  <p>Certified Bangers Only.</p>
  <div class="btn" onclick="scrollToReels()">Explore Reels</div>
</section>

<!-- REELS GRID -->
<section class="grid">

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXUVNahDHkf/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXpSxcGjPnW/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXkVTLqDL6v/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXuWLb2DGEz/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXr23vEDP8P/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXmWuXejBpK/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXj6cRdjCd6/embed"></iframe>
  </div>

  <div class="card reveal">
    <iframe src="https://www.instagram.com/reel/DXhpPHNDAJk/embed"></iframe>
  </div>
</section>

<footer>
  © lyricvault.wav — all rights reserved
</footer>

<script>
function scrollToReels() {
  document.querySelector('.grid').scrollIntoView({ behavior: 'smooth' });
}

/* Scroll reveal animation */
window.addEventListener('scroll', () => {
  const reveals = document.querySelectorAll('.reveal');
  reveals.forEach(el => {
    const windowHeight = window.innerHeight;
    const elementTop = el.getBoundingClientRect().top;

    if (elementTop < windowHeight - 100) {
      el.classList.add('active');
    }
  });
});
</script>

</body>
</html>
