<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lyricvault.wav</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Helvetica Neue', sans-serif;
}

body {
  display: flex;
  background: #0a0a0a;
  color: white;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #000;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  margin-bottom: 30px;
  font-size: 1.5rem;
}

.sidebar a {
  display: block;
  color: #aaa;
  margin: 15px 0;
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  color: white;
}

/* MAIN */
.main {
  margin-left: 220px;
  width: 100%;
}

/* HERO */
.hero {
  height: 60vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px;
  background: linear-gradient(135deg, #111, #000);
  animation: gradientMove 6s infinite alternate;
}

.hero h1 {
  font-size: 3rem;
}

.hero p {
  color: #bbb;
  margin-top: 10px;
}

.hero button {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  border-radius: 30px;
  background: white;
  color: black;
  cursor: pointer;
}

/* FEATURED */
.featured {
  padding: 30px;
}

.featured iframe {
  width: 100%;
  height: 500px;
  border-radius: 20px;
  border: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
}

iframe {
  width: 100%;
  height: 450px;
  border: none;
}

/* ANIMATION */
@keyframes gradientMove {
  from {background-position: left;}
  to {background-position: right;}
}

/* MOBILE */
@media(max-width: 768px){
  .sidebar {
    display: none;
  }
  .main {
    margin-left: 0;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎧 lyricvault</h2>
  <a href="#">Home</a>
  <a href="#">Kanye</a>
  <a href="#">Drake</a>
  <a href="#">Travis</a>
  <a href="#">Weeknd</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HERO -->
  <section class="hero">
    <h1>lyricvault.wav</h1>
    <p>lyrics that hit different.</p>
    <button onclick="scrollToReels()">Explore</button>
  </section>

  <!-- FEATURED REEL -->
  <section class="featured">
    <h2>🔥 Featured</h2>
    <iframe src="https://www.instagram.com/reel/REEL_ID/embed"></iframe>
  </section>

  <!-- REELS GRID -->
  <section class="grid" id="reels">

    <div class="card">
      <iframe src="https://www.instagram.com/reel/REEL_ID/embed"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.instagram.com/reel/REEL_ID/embed"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.instagram.com/reel/REEL_ID/embed"></iframe>
    </div>

    <div class="card">
      <iframe src="https://www.instagram.com/reel/REEL_ID/embed"></iframe>
    </div>

  </section>

</div>

<script>
function scrollToReels() {
  document.getElementById("reels").scrollIntoView({behavior: "smooth"});
}
</script>

</body>
</html>
